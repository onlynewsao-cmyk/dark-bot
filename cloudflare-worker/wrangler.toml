name = "dark-bot-yt-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# Free plan: 100k requests/day, 10ms CPU time limit
# For YouTube proxy, free tier should be sufficient

[vars]
# Set these via `wrangler secret put` or Cloudflare dashboard
# API_KEY = "your-secret-api-key"
# COBALT_URL = "https://your-cobalt-instance.com"
# COBALT_API_KEY = "your-cobalt-api-key"
