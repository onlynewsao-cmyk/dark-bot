# ===========================================
# DARK BOT - Render Blueprint
# Não coloque segredos aqui. As chaves ficam no painel do Render.
# ===========================================

services:
  - type: web
    name: dark-bot
    env: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: APP_URL
        value: https://dark-bot-hq2k.onrender.com
      - key: BOT_NAME
        value: DARK BOT
      - key: BOT_NUMBER
        sync: false
      - key: BOT_PREFIX
        value: "!"
      - key: OWNER_NAME
        value: Dark Net
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_USERNAME
        value: darknet
      - key: SESSION_SECRET
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: TENOR_API_KEY
        sync: false
      - key: YT_PROXY_URL
        value: https://dark-bot-yt-proxy.evanderpedro3.workers.dev
      - key: YTDLP_EXTRACTOR_ARGS
        value: youtube:player_client=default,web_creator,android_vr
      - key: YTDLP_COOKIES_BASE64
        sync: false
      - key: YTDLP_PROXY
        sync: false
      - key: COBALT_API_URL
        sync: false
      - key: COBALT_API_KEY
        sync: false
      - key: COBALT_AUTH_SCHEME
        value: Api-Key
      - key: SOCIALKIT_API_KEY
        sync: false
      - key: SAVENOW_API_KEY
        sync: false
      - key: YOUTUBE_API_URLS
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DOWNLOADER_API_KEY
        sync: false
      - key: SYSTEMZONE_API_URL
        value: https://systemzone.store
      - key: SYSTEMZONE_API_KEY
        value: freekey
      - key: STICKER_VIDEO_MAX_SEC
        value: 8
