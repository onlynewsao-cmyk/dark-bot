# ===========================================
# DARK BOT - Render Blueprint
# Não coloque segredos aqui. As chaves ficam no painel do Render.
# ===========================================

services:
  - type: web
    name: dark-bot
    env: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: APP_URL
        value: https://dark-bot-accg.onrender.com
      - key: BOT_NAME
        value: DARK BOT
      - key: BOT_NUMBER
        value: "244949926074"
      - key: BOT_PREFIX
        value: "!"
      - key: OWNER_NAME
        value: Dark Net
      - key: OWNER_NUMBER
        value: "244945280380"
      - key: OWNER_USERNAME
        value: darknet
      - key: SESSION_SECRET
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TENOR_API_KEY
        sync: false
